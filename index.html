<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Nudge CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f0f2f7; }
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }
      @keyframes shimmerGradient {
        0%   { background-position: 0% 50%; }
        50%  { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      /* Custom thin scrollbar */
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.25); border-radius: 99px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(99,102,241,0.5); }
      * { scrollbar-width: thin; scrollbar-color: rgba(99,102,241,0.25) transparent; }

      /* Text selection */
      ::selection { background: rgba(99,102,241,0.2); color: inherit; }

      /* Smooth focus ring on all focusables */
      :focus-visible { outline: 2px solid rgba(99,102,241,0.6); outline-offset: 2px; border-radius: 6px; }

      /* Pointer cursor on all interactive elements */
      button, [role="button"], label[for], summary { cursor: pointer; }

      /* Number smoothing */
      .tabular-nums, [class*="font-mono"] { font-variant-numeric: tabular-nums; }

      /* Prevent layout shift on scrollbar appearance */
      html { overflow-y: scroll; }
    </style>
